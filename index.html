<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MyDrive</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Top Bar -->
    <header class="navbar">
        <div class="logo">☁️ MyDrive</div>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Logout</a>
        </div>
    </header>

    <div class="container">

        <!-- Upload Section -->
        <div class="card">
            <h2>Upload File</h2>
            <div class="upload-box">
                <p>Drag & drop files here or</p>
                <input type="file" id="fileInput">
                <button class="btn">Browse Files</button>
            </div>
        </div>

        <!-- Files Section -->
        <div class="card">
            <h2>My Files</h2>

            <table>
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Size</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>report.pdf</td>
                        <td>200 KB</td>
                        <td>
                            <button class="btn download">Download</button>
                            <button class="btn delete">Delete</button>
                        </td>
                    </tr>

                    <tr>
                        <td>notes.docx</td>
                        <td>150 KB</td>
                        <td>
                            <button class="btn download">Download</button>
                            <button class="btn delete">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</body>

</html>
